<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التحليلات — استبيان آراء الموظفين</title>
<link rel="stylesheet" href="style.css">
</head>
<body dir="rtl">
<header>
  <img src="logo.svg" alt="شعار الاستبيان">
  <h1>التحليلات</h1>
</header>
<main>
  <div class="hero">
    <div class="hero-block">
      <div class="label">أكثر وسم متكرر لدى الموظفات</div>
      <div class="value" id="topTagOverall">—</div>
    </div>
    <div class="hero-block">
      <div class="label">إجمالي الردود</div>
      <div class="value" id="totalResponses">0</div>
    </div>
    <div class="hero-block">
      <div class="label">عدد الموظفات</div>
      <div class="value" id="totalEmployees">0</div>
    </div>
  </div>

  <div class="glass-card">
    <h2>المشاكل حسب الفرع (حسب الأوسمة)</h2>
    <div id="branchesWrap" class="branch-grid"><div class="empty-hint">لا توجد بيانات كافية بعد.</div></div>
  </div>

  <div class="glass-card">
    <h2>التعليقات حسب الوسم</h2>
    <div class="tag-filter-row" id="tagFilterRow"><div class="empty-hint">لا يوجد أوسمة بعد.</div></div>
    <div id="commentsWrap" style="margin-top:16px;"></div>
  </div>
</main>

<script type="module" src="analytics.js"></script>
</body>
</html>
